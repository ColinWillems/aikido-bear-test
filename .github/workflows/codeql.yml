# CodeQL deep SAST for the languages GitHub supports in this repo without a
# native build step: JavaScript/TypeScript (Firebase Functions + landing page)
# and Python (build/translation scripts + the security policy scripts).
# Dart, Kotlin and Swift are not covered by CodeQL here - Semgrep and the
# native analyzers (Android Lint / xcodebuild analyze) cover those instead.
name: CodeQL

on:
  pull_request:
    branches: [main, "builds/staging", "builds/production"]
  push:
    branches: [main]
  schedule:
    - cron: "27 4 * * 1" # Mondays 04:27 UTC

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyze:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write # required to upload CodeQL results
      actions: read
    strategy:
      fail-fast: false
      matrix:
        language: ["javascript-typescript", "python"]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@6825d5659bf007b85a0866e2d0f434aacf50de94 # v3.27.5
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@6825d5659bf007b85a0866e2d0f434aacf50de94 # v3.27.5

      - name: Analyze
        uses: github/codeql-action/analyze@6825d5659bf007b85a0866e2d0f434aacf50de94 # v3.27.5
        with:
          category: "/language:${{ matrix.language }}"
