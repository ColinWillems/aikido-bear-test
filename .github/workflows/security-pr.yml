# Fast, diff-aware security checks for every pull request.
# Native artifact builds are intentionally excluded here (consistent with the
# project's decision to keep PR CI fast - see docs/CICD.md); Android Lint,
# xcodebuild analyze and MobSF run on the main-branch deep-scan workflow.
name: Security - PR

on:
  pull_request:
    branches: [main, "builds/staging", "builds/production"]

concurrency:
  group: security-pr-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: read source by default; jobs opt-in to extra scopes.
permissions:
  contents: read

env:
  FLUTTER_VERSION: "3.41.1"
  SEMGREP_RULESETS: "p/default p/secrets p/dart p/kotlin p/swift p/javascript p/typescript p/python"

jobs:
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout (full history for diff scan)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: ${{ github.workspace }}/.gitleaks.toml
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "true"
          GITLEAKS_ENABLE_SUMMARY: "true"

  semgrep:
    name: Semgrep SAST (diff-aware)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Install Semgrep
        run: python -m pip install --no-cache-dir "semgrep==1.97.0"
      - name: Semgrep full SARIF (report only)
        continue-on-error: true
        run: |
          semgrep scan --metrics=off --sarif --output semgrep.sarif \
            $(for r in $SEMGREP_RULESETS; do echo --config $r; done)
      - name: Upload Semgrep SARIF to code scanning
        if: ${{ always() && hashFiles('semgrep.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@f09c1c0a94de965c15400f5634aa42fac8fb8f88 # v3.27.5
        with:
          sarif_file: semgrep.sarif
          category: semgrep
      - name: Archive Semgrep SARIF
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: semgrep-sarif
          path: semgrep.sarif
          if-no-files-found: ignore
      - name: Gate on new high-confidence (ERROR) findings vs base
        run: |
          semgrep scan --metrics=off --error --severity ERROR \
            --baseline-commit "${{ github.event.pull_request.base.sha }}" \
            $(for r in $SEMGREP_RULESETS; do echo --config $r; done)

  dart-analyze-test:
    name: Dart analyze + security tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Resolve dependencies
        working-directory: bear_adventure_app
        run: flutter pub get
      - name: Static analysis
        working-directory: bear_adventure_app
        run: flutter analyze
      - name: Run tests (incl. deep-link / unlock-url security tests)
        working-directory: bear_adventure_app
        run: flutter test --reporter expanded

  functions-lint:
    name: ESLint (Firebase Functions)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: fir-functions/functions/package-lock.json
      - name: Install
        working-directory: fir-functions/functions
        run: npm ci
      # Reported (not blocking): surfaces JS lint issues without failing on
      # pre-existing style findings. Semgrep is the blocking JS/TS SAST gate.
      - name: ESLint
        working-directory: fir-functions/functions
        continue-on-error: true
        run: npm run lint

  dependency-review:
    name: Dependency & license review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write # for the PR summary comment
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
          license-check: true

  mobile-config-policy:
    name: Mobile config policy (PR)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Run mobile policy (pr mode)
        run: |
          python3 .ci/security/mobile_policy.py --mode pr \
            --sarif mobile-policy.sarif --json mobile-policy.json
      - name: Upload mobile policy SARIF
        if: ${{ always() && hashFiles('mobile-policy.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@f09c1c0a94de965c15400f5634aa42fac8fb8f88 # v3.27.5
        with:
          sarif_file: mobile-policy.sarif
          category: mobile-config-policy
      - name: Archive mobile policy report
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mobile-policy-report
          path: |
            mobile-policy.sarif
            mobile-policy.json
          if-no-files-found: ignore

  security-script-tests:
    name: Policy script unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Run unit tests
        run: python3 -m unittest discover -s .ci/security/tests -p "test_*.py" -v
