name: firebase_app_utils
description: Reusable app utilities to make using Flutter with Firebase easier and quicker.
version: 1.0.0
publish_to: none

environment:
  sdk: ">=3.0.6 <4.0.0"
  flutter: ">=3.22.1"

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  firebase_crashlytics: ^4.3.4
  firebase_analytics: ^11.4.4
  firebase_storage: ^12.4.4
  firebase_performance: ^0.10.1
  cloud_firestore: ^5.6.5
  get: 5.0.0-release-candidate-9.3.2
  flutter_cache_manager: ^3.4.1

  # Local monorepo dependency (included in the handover bundle)
  flutter_app_utils:
    path: ../flutter_app_utils

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.6.1
  flutter_gen_runner: ^5.11.0
